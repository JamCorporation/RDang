messages:
  only-player: "&7[&#FE6A6A☒&7] &fЭту команду можно использовать только игроку!"
  no-permission: "&7[&#FE6A6A☒&7] &fУ вас нет прав на эту команду!"
  unknown-command: "&7[&#FE6A6A☒&7] &fНеизвестная команда: &#557c93{command}"
  help:
    - "&#FEF06A&lRDang &8| &fПомощь по командам:"
    - " &f/rdang additem &#557c93[шанс] [минимум] [максимум]&f — &7добавить лут в данжи."
    - " &f/rdang admins &#557c93[test,remove,loot]&f - &7тест данжей."
    - " &f/rdang compass &#557c93[ник] [количество]&f — &7выдать компас от данжа."
    - " &f/rdang givekey &#557c93[ник] [количество]&f — &7выдать ключ от данжа."
    - " &f/rdang list —  &7посмотреть все данжи сервера."
    - " &f/rdang reload — &7перезагрузить конфиг плагина."
    - " &f/rdang schem &#557c93[name]&f — &7спавнит возле вас рандом данж."
    - " &f/rdang spawn &#557c93[количество] [мир] &f — &7спавн данжа в мире."
    - " &f/rdang undo &#557c93[айди]&f — &7удаляет данж его регион и данные шалкеров."
    - " &f/rdang update &f — &7обновляет плагин"

  givekey:
    usage: "&7[&#FE6A6A☒&7] &fИспользование: /rdang givekey <ник> <количество>"
    give: "&7[&#6AFE76☑&7] &fВыдано ключей &#557c93{key}&f для игрока &#557c93{player}"
    noplayer: "&7[&#FE6A6A☒&7] &fИгрок не найден."
    keynull: "&7[&#FE6A6A☒&7] &fОшибка: ключ не загружен!"
    nickplayer: "&7[&#FE6A6A☒&7] &fУкажите ник игрока."
    minamount: "&7[&#FE6A6A☒&7] &fКоличество должно быть больше &#557c930&f!"
    invalidamount: "&7[&#FE6A6A☒&7] &fНекорректное количество!"

  additem:
