items:
  key:
    material: tripwire_hook # Тип материала (можно использовать basehead-{BASE64_STRING} для кастомной головы)
    name: "&7[&#3C5674🧪&7] &fКлюч для данжа" # Отображаемое имя
    chanceSpawn: 70 # Шанс спавна в ванильных данжах
    hideEnchantments: true # Скрыть эффекты зачарования на предмете
    custom_model_data: 1002
    saveChance: 50 # Шанс сохранения ключа при открытии
    glow: true # Подсветка выброшенного ключа на земле
    drop: true # Выпадение ключа при выходе с сервера
    lore: # Описание предмета
      - "&f"
      - "§fИспользуйте &#557c93данный&f ключ для открытия"
      - "§fданжа с секретным &#557c93хранилищем"
      - '&f'

  compass:
    material: compass # Тип материала (можно использовать basehead-{BASE64_STRING} для кастомной головы)
    name: "&7[&#3C5674🧭&7] &fКомпас" # Отображаемое имя
    hideEnchantments: false # Скрыть эффекты зачарования на предмете
    custom_model_data: 1003
    сooldown: "30s" # Поддерживает 1m, 1h, 10s и т.д.
    sounds: "item_totem_use" # Звук при активации
    glow: true # Подсветка выброшенного компаса на земле
    drop: true # Выпадение компаса при выходе с сервера
    lore: # Описание предмета
      - "&f"
      - "§fИспользуйте &#557c93данный&f компас чтобы "
      - "§fнайти данж, нажмите &#557c93ПКМ&f для активации"
      - "&f"