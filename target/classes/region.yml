region:
  size:
    x: 24 # Ширина региона по оси X (восток-запад)
    z: 24 # Длина региона по оси Z (север-юг)

  name_format: "dang_{id}" # Название региона

  height:
    min: 0 # Минимальная высота (дно региона)
    max: 255 # Максимальная высота (потолок региона)

  flags: # Флаги WorldGuard
    use: "allow"
    block-break: "deny"
    build: "deny"
    mob-spawning: "deny"
    pvp: "allow"
    tnt: "deny"
    chest-access: "allow"
    creeper-explosion: "deny"
    damage-animals: "deny"
    ghast-fireball: "deny"
    respawn-anchors: "deny"
    destroy-vehicle: "deny"
    enderdragon-block-damage: "deny"
    mob-damage: "deny"
    lava-fire: "deny"
    lightning: "deny"
    lighter: "deny"

check:
  distance-dangs: 100 # Максимальное расстояние между данжами
  check_other_regions: true # Проверять пересечения с чужими регионами (Spawn и т.д.)