name: Rdang
version: '1.8.2'
main: ru.truhot.rdang.RDang
api-version: '26.1.2'
author: Truhot
website: https://truhott.github.io/RDang-site/index.html
depend: [ WorldGuard, WorldEdit ]
softdepend: [ CoreProtect ]
commands:
  rdang:
   permission: rdang.use
   aliases: [ rd, dang, bdang, adang, edang, holydang ]

permissions:
  rdang.*:
    default: false
    children:
      rdang.admin: true
  rdang.admin:
    default: op
    children:
      rdang.use: true
      rdang.additem: true
      rdang.spawn: true
      rdang.schem: true
      rdang.reload: true
      rdang.undo: true
      rdang.list: true
      rdang.menu: true
      rdang.admins: true
      rdang.update: true
      rdang.migrate: true
      rdang.give.key: true
      rdang.give.compass: true
  rdang.use:
    default: op
  rdang.additem:
    default: op
  rdang.spawn:
    default: op
  rdang.schem:
    default: op
  rdang.reload:
    default: op
  rdang.undo:
    default: op
  rdang.list:
    default: op
  rdang.menu:
    default: op
  rdang.admins:
    default: op
  rdang.update:
    default: op
  rdang.migrate:
    default: op
  rdang.give.key:
    default: op
  rdang.give.compass:
    default: op
